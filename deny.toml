# cargo-deny: control de licencias, CVEs y fuentes.
[advisories]
yanked = "deny"

[licenses]
# MPL-2.0 (copyleft por fichero, no infecta nuestro código) y CDLA-Permissive-2.0
# (licencia de datos permisiva) las introduce wasmtime 45 vía deps; ambas son seguras
# para un proyecto MIT/Apache. bzip2-1.0.6 (estilo BSD, libbz2-rs-sys), MIT-0 y
# CC0-1.0 (ppmd-rust) llegan vía zip→aion-browser; todas permisivas.
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-3.0", "Zlib", "MPL-2.0", "CDLA-Permissive-2.0", "bzip2-1.0.6", "MIT-0", "CC0-1.0"]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
