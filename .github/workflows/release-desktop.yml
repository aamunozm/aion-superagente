name: release-desktop

# Construye los instalables AUTOCONTENIDOS de AION (con Ollama embebido) para
# macOS (universal: Apple Silicon + Intel) y Windows (NSIS x64). El usuario final
# NO instala Docker ni Ollama: todo viaja dentro de la app.
#
# Disparar manualmente (workflow_dispatch) o al publicar un tag v*.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  # ── macOS universal (Apple Silicon + Intel) ──────────────────────────────
  macos:
    runs-on: macos-14   # Apple Silicon; produce binario universal
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - name: Instalar Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked
      - name: Instalar Ollama (fuente del runtime a vendorizar)
        run: brew install --cask ollama-app
      - name: Vendorizar runtime Ollama (universal arm64+x86_64)
        run: bash apps/desktop/scripts/vendor-ollama-runtime.sh
      - name: Dependencias web
        run: pnpm install --frozen-lockfile
      - name: Build .app UNIVERSAL + DMG
        run: bash apps/desktop/build-universal.sh && cd apps/desktop && cargo tauri build --target universal-apple-darwin --bundles dmg
      - uses: actions/upload-artifact@v4
        with:
          name: AION-macos-universal
          path: |
            apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
            apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

  # ── Windows x64 (instalador NSIS) ────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - name: Instalar Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked
      - name: Vendorizar runtime Ollama (Windows x64)
        run: powershell -ExecutionPolicy Bypass -File apps/desktop/scripts/vendor-ollama-runtime-windows.ps1
      - name: Compilar sidecars (x86_64-pc-windows-msvc)
        shell: bash
        run: |
          TRIPLE=x86_64-pc-windows-msvc
          cargo build --release --target $TRIPLE -p aion-core --bin aion-core
          cargo build --release --target $TRIPLE -p aion-control-plane --bin aion-control-plane
          mkdir -p apps/desktop/src-tauri/binaries
          cp target/$TRIPLE/release/aion-core.exe          apps/desktop/src-tauri/binaries/aion-core-$TRIPLE.exe
          cp target/$TRIPLE/release/aion-control-plane.exe apps/desktop/src-tauri/binaries/aion-control-plane-$TRIPLE.exe
      - name: Dependencias web
        run: pnpm install --frozen-lockfile
      - name: Build instalador NSIS
        run: cd apps/desktop && cargo tauri build --bundles nsis
      - uses: actions/upload-artifact@v4
        with:
          name: AION-windows-x64
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
