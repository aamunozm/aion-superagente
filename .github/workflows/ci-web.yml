name: CI Web

on:
  workflow_dispatch:
  push:
    paths: ["packages/**", "apps/web/**", "package.json", "pnpm-workspace.yaml", "turbo.json", ".github/workflows/ci-web.yml"]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
